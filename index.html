<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Alerts</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --accent-red: #d32f2f;
            --accent-green: #388e3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 5px; }
        .status-bar { font-size: 0.9em; color: #666; }

        #nws-alerts-display {
            min-height: 200px;
        }

        /* Alert Styling */
        .alert-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 8px solid var(--accent-red);
            animation: slideIn 0.3s ease-out;
        }

        .alert-title {
            color: var(--accent-red);
            font-size: 1.25rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .alert-headline {
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
        }

        details {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        details summary { font-weight: bold; color: #555; }

        .description {
            font-size: 0.95rem;
            white-space: pre-wrap;
            margin-top: 10px;
            color: #444;
        }

        /* No Alerts Styling */
        .no-alerts {
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 2px dashed #ccc;
        }

        .loading { text-align: center; font-style: italic; color: #888; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Live Weather Alerts</h1>
        <div class="status-bar" id="status-update">Fetching latest data...</div>
    </header>

    <div id="nws-alerts-display">
        <div class="loading">Connecting to National Weather Service...</div>
    </div>
</div>
