<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northwest Georgia Live Weather Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --accent-red: #d32f2f;
            --accent-green: #388e3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 5px; }
        .status-bar { font-size: 0.9em; color: #666; }

        #nws-alerts-display {
            min-height: 200px;
        }

        .alert-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 8px solid var(--accent-red);
            animation: slideIn 0.3s ease-out;
        }

        .alert-title {
            color: var(--accent-red);
            font-size: 1.25rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .alert-headline {
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
        }

        details {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        details summary { font-weight: bold; color: #555; }

        .description {
            font-size: 0.95rem;
            white-space: pre-wrap;
            margin-top: 10px;
            color: #444;
        }

        .no-alerts {
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 2px dashed #ccc;
        }

        .loading { text-align: center; font-style: italic; color: #888; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .obs-card {
            background: #2c3e50;
            color: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .obs-station {
            font-size: 0.9rem;
            text-transform: uppercase;
            opacity: 0.7;
            text-align: center;
            margin-bottom: 10px;
        }

        .obs-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        #current-temp {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        #current-desc {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
        }

        .obs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 16px;
        }

        .obs-item {
            display: flex;
            flex-direction: column;
        }

        .obs-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 0.05em;
        }

        .obs-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .radar-card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Northwest Georgia Weather</h1>
        <div class="status-bar" id="status-update">Fetching latest data...</div>
    </header>

    <!-- Observations -->
    <div class="obs-card">
        <div class="obs-station">Paulding County Airport (KPUJ)</div>
        <div class="obs-main">
            <p id="current-temp">--°F</p>
            <p id="current-desc">Loading...</p>
        </div>
        <div class="obs-grid">
            <div class="obs-item">
                <span class="obs-label">Dewpoint</span>
                <span class="obs-value" id="current-dewpoint">--</span>
            </div>
            <div class="obs-item">
                <span class="obs-label">Wind Speed</span>
                <span class="obs-value" id="current-wind">--</span>
            </div>
            <div class="obs-item">
                <span class="obs-label">Wind Direction</span>
                <span class="obs-value" id="current-wind-dir">--</span>
            </div>
            <div class="obs-item">
                <span class="obs-label">Rainfall (1hr)</span>
                <span class="obs-value" id="current-precip">--</span>
            </div>
        </div>
    </div>

    <!-- Alerts -->
    <div id="nws-alerts-display">
        <div class="loading">Connecting to National Weather Service...</div>
    </div>

    <!-- Radar -->
    <div class="radar-card">
        <iframe src="https://radar.weather.gov/ridge/standard/KFFC_loop.gif" width="100%" height="300" style="border:none; border-radius: 8px;"></iframe>
        <p style="font-size: 0.8rem; text-align: center; margin-top: 5px;">Peachtree City (KFFC) Live Radar</p>
    </div>
</div>

<script>
const CONFIG = {
    state: 'GA',
    stations: ['KPUJ', 'KFFC'],
    userAgent: '(Ryan Gallagher Weather, ryanlgallagher.work@gmail.com)',
    refreshMs: 60000
};

const TARGET_COUNTIES = ['Paulding', 'Cobb', 'Douglas', 'Polk', 'Bartow', 'Cherokee', 'Haralson', 'Floyd'];

const cToF = (c) => Math.round((c * 9/5) + 32);
const msToMph = (ms) => Math.round(ms * 2.237);
const mmToIn = (mm) => (mm / 25.4).toFixed(2);

function safe(val, fallback = null) {
    return (val === null || val === undefined) ? fallback : val;
}

function degreesToCompass(deg) {
    if (deg === null) return 'N/A';
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
}

async function fetchObservationForStation(station) {
    const res = await fetch(`https://api.weather.gov/stations/${station}/observations/latest`, {
        headers: { 'User-Agent': CONFIG.userAgent }
    });
    if (!res.ok) throw new Error(`Station ${station} failed`);
    return (await res.json()).properties;
}

async function fetchObservations() {
    const tempEl    = document.getElementById('current-temp');
    const descEl    = document.getElementById('current-desc');
    const dewEl     = document.getElementById('current-dewpoint');
    const windEl    = document.getElementById('current-wind');
    const windDirEl = document.getElementById('current-wind-dir');
    const precipEl  = document.getElementById('current-precip');

    for (const station of CONFIG.stations) {
        try {
            const prop = await fetchObservationForStation(station);

            const tempC    = safe(prop.temperature?.value);
            const dewC     = safe(prop.dewpoint?.value);
            const windMS   = safe(prop.windSpeed?.value);
            const windDeg  = safe(prop.windDirection?.value);
            const precipMM = safe(prop.precipitationLastHour?.value);
            const desc     = safe(prop.textDescription, 'No description');

            tempEl.innerText    = tempC !== null ? `${cToF(tempC)}°F` : '--°F';
            descEl.innerText    = desc;
            dewEl.innerText     = dewC !== null ? `${cToF(dewC)}°F` : 'N/A';
            windEl.innerText    = windMS !== null ? `${msToMph(windMS)} mph` : 'Calm';
            windDirEl.innerText = windDeg !== null ? `${degreesToCompass(windDeg)} (${Math.round(windDeg)}°)` : 'N/A';
            precipEl.innerText  = precipMM !== null && precipMM > 0 ? `${mmToIn(precipMM)}"` : 'None';

            return;
        } catch (err) {
            console.warn(`Station failed: ${station}`, err);
        }
    }

    document.getElementById('current-desc').innerText = 'Observations unavailable';
    document.getElementById('current-temp').innerText = '--°F';
}

async function fetchAlerts() {
    const displayArea  = document.getElementById('nws-alerts-display');
    const statusUpdate = document.getElementById('status-update');

    try {
        const res = await fetch(
            `https://api.weather.gov/alerts/active?area=${CONFIG.state}`,
            { headers: { 'User-Agent': CONFIG.userAgent } }
        );
        if (!res.ok) throw new Error('Alerts fetch failed');

        const data = await res.json();
        statusUpdate.innerText = `Last checked: ${new Date().toLocaleTimeString()}`;

        const filteredAlerts = data.features.filter(alert => {
            const area = alert.properties.areaDesc || '';
            return TARGET_COUNTIES.some(county => area.includes(county));
        });

        if (filteredAlerts.length === 0) {
            displayArea.innerHTML = `
                <div class="no-alerts">
                    <span style="font-size: 3rem;">☀️</span>
                    <h3>All Clear</h3>
                    <p>No active alerts for your area.</p>
                </div>`;
            return;
        }

        displayArea.innerHTML = filteredAlerts.map(alert => {
            const p = alert.properties;
            return `
                <div class="alert-card">
                    <span class="alert-title">${p.event}</span>
                    <span class="alert-headline">${p.headline || ''}</span>
                    <details>
                        <summary>Details</summary>
                        <div class="description">${p.description || ''}</div>
                    </details>
                </div>
            `;
        }).join('');

    } catch (err) {
        console.error(err);
        displayArea.innerHTML = `<div class="loading">Failed to load alerts. Check console.</div>`;
    }
}

function init() {
    fetchObservations();
    fetchAlerts();
    setInterval(fetchObservations, CONFIG.refreshMs);
    setInterval(fetchAlerts, CONFIG.refreshMs);
}

init();
</script>
</body>
</html>
